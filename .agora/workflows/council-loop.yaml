name: council-loop
description: Autonomous council workflow. Loads ticket context, runs deep per-path review evidence gathering, posts a structured review note, submits a conditional verdict based on evidence quality, persists findings, and handles veto outcomes.
requiredParams:
  - ticketId
  - transition
  - targetStatus
  - callerAgentId
  - callerSpecialization
steps:
  # 1. Load ticket
  - key: ticket
    tool: get_ticket
    description: Load the target ticket and its current discussion state.
    input:
      ticketId: "{{params.ticketId}}"

  # 2. Load changes
  - key: changes
    tool: get_change_pack
    description: Load current change context when a commit boundary is available.
    onError: continue
    input:
      sinceCommit: "{{params.sinceCommit}}"
      verbosity: compact

  # 3. Check consensus — maybe quorum is already met
  - key: consensus
    tool: check_consensus
    description: Inspect current quorum/veto state for the requested transition.
    input:
      ticketId: "{{params.ticketId}}"
      transition: "{{params.transition}}"

  # 4. Advance immediately if quorum already met
  - key: advanceExisting
    tool: update_ticket_status
    description: Advance ticket when consensus was already reached before this cycle.
    condition: "steps.consensus.advisoryReady"
    onError: continue
    input:
      ticketId: "{{params.ticketId}}"
      status: "{{params.targetStatus}}"
      comment: "Council autonomous review: quorum already met, advancing."

  # 5. Collect historical and decision context related to the ticket
  - key: issuePack
    tool: get_issue_pack
    description: Search notes, decisions, and stored knowledge related to the ticket scope.
    condition: "!steps.consensus.advisoryReady"
    onError: continue
    input:
      query: "{{params.callerSpecialization}} {{steps.ticket.ticketId}} {{steps.ticket.title}} {{steps.ticket.tags}} {{steps.ticket.affectedPaths}}"
      verbosity: compact

  # 6. Collect code search context anchored to the ticket scope
  - key: codePack
    tool: get_code_pack
    description: Search for the most relevant code around the ticket and affected paths.
    condition: "!steps.consensus.advisoryReady"
    onError: continue
    input:
      query: "{{params.callerSpecialization}} review {{params.transition}} {{steps.ticket.title}} {{steps.ticket.description}} {{steps.ticket.affectedPaths}}"
      verbosity: compact

  # 7. Per-path code evidence
  - key: pathCodePacks
    tool: get_code_pack
    description: Search code evidence per affected path to reveal nearby symbols and implementation seams.
    condition: "!steps.consensus.advisoryReady"
    onError: continue
    forEach: "steps.ticket.affectedPaths"
    input:
      query: "{{params.callerSpecialization}} {{steps.ticket.title}}"
      scope: "{{item}}"
      verbosity: compact

  # 8. Complexity analysis
  - key: complexity
    tool: analyze_complexity
    description: Inspect structural complexity for each affected path in the ticket scope.
    condition: "!steps.consensus.advisoryReady"
    onError: continue
    forEach: "steps.ticket.affectedPaths"
    input:
      filePath: "{{item}}"

  # 9. Test coverage analysis
  - key: coverage
    tool: analyze_test_coverage
    description: Inspect structural test coverage for each affected path in the ticket scope.
    condition: "!steps.consensus.advisoryReady"
    onError: continue
    forEach: "steps.ticket.affectedPaths"
    input:
      filePath: "{{item}}"

  # 10. Dependency ripple analysis — assess blast radius of the change
  - key: rippleAnalysis
    tool: lookup_dependencies
    description: Trace reverse imports for each affected path to assess blast radius.
    condition: "!steps.consensus.advisoryReady"
    onError: continue
    forEach: "steps.ticket.affectedPaths"
    input:
      filePath: "{{item}}"

  # 11. Advisory dispatch rules
  - key: suggestions
    tool: suggest_actions
    description: Advisory rule engine output for the ticket affected paths.
    condition: "!steps.consensus.advisoryReady"
    onError: continue
    input:
      changedPaths: "{{steps.ticket.affectedPaths}}"

  # 12. Deep review note
  - key: reviewNote
    tool: comment_ticket
    description: Attach a deep review note with implications and recommendations before verdict.
    condition: "!steps.consensus.advisoryReady"
    onError: continue
    input:
      ticketId: "{{params.ticketId}}"
      content: "[Deep Council Review]\n\nspecialization={{params.callerSpecialization}}\ntransition={{params.transition}}\nticket={{steps.ticket.ticketId}}\ntitle={{steps.ticket.title}}\nstatus={{steps.ticket.status}}\nseverity={{steps.ticket.severity}}\npriority={{steps.ticket.priority}}\naffectedPaths={{steps.ticket.affectedPaths}}\ndependencies={{steps.ticket.dependencies}}\nblastRadius={{steps.rippleAnalysis}}\ncomplexity={{steps.complexity}}\ncoverage={{steps.coverage}}\nsuggestions={{steps.suggestions}}\n\nreviewScope=Examined ticket history, related issue context, repository code search, per-path complexity, structural test coverage, dependency blast radius, and suggested follow-up actions.\nrecommendation=The verdict below reflects specialization-specific gate readiness based on the reviewed evidence."

  # 13. Assign the caller to its own council specialization
  - key: assignment
    tool: assign_council
    description: Bind this agent to its own specialization for verdict submission.
    condition: "!steps.consensus.advisoryReady"
    onError: continue
    input:
      ticketId: "{{params.ticketId}}"
      councilAgentId: "{{params.callerAgentId}}"
      specialization: "{{params.callerSpecialization}}"

  # 14. Submit pass verdict ONLY when evidence gathering succeeded
  - key: verdict
    tool: submit_verdict
    description: Evidence-backed pass verdict when complexity and coverage data are available.
    condition: "!steps.consensus.advisoryReady && steps.complexity && steps.coverage"
    onError: continue
    input:
      ticketId: "{{params.ticketId}}"
      specialization: "{{params.callerSpecialization}}"
      verdict: pass
      reasoning: "{{params.callerSpecialization}} review for {{steps.ticket.ticketId}} ({{steps.ticket.title}}): examined {{steps.ticket.affectedPaths}} with complexity={{steps.complexity}}, coverage={{steps.coverage}}, ripple={{steps.rippleAnalysis}}, suggestions={{steps.suggestions}}. Evidence supports {{params.transition}}."
      transition: "{{params.transition}}"

  # 15. Submit needs_revision when evidence is insufficient
  - key: verdictRevision
    tool: submit_verdict
    description: Block advancement when structural evidence could not be gathered.
    condition: "!steps.consensus.advisoryReady && !steps.complexity && !steps.coverage"
    onError: continue
    input:
      ticketId: "{{params.ticketId}}"
      specialization: "{{params.callerSpecialization}}"
      verdict: needs_revision
      reasoning: "Insufficient evidence for {{steps.ticket.ticketId}}: complexity and coverage analysis unavailable for {{steps.ticket.affectedPaths}}. Cannot assess gate readiness for {{params.transition}}."
      transition: "{{params.transition}}"

  # 15b. Return ticket to in_progress when needs_revision verdict was submitted
  - key: rejectToInProgress
    tool: update_ticket_status
    description: Send ticket back to in_progress so the developer loop can rework it.
    condition: "!steps.consensus.advisoryReady && !steps.complexity && !steps.coverage"
    onError: continue
    input:
      ticketId: "{{params.ticketId}}"
      status: in_progress
      comment: "Council review: needs_revision — insufficient evidence for {{params.transition}}. Returning to developer for rework."

  # 16. Persist review findings as institutional knowledge
  - key: reviewKnowledge
    tool: store_knowledge
    description: Persist council review findings for future reference.
    condition: "!steps.consensus.advisoryReady"
    onError: continue
    input:
      type: context
      scope: repo
      title: "Council review: {{steps.ticket.ticketId}} ({{params.callerSpecialization}})"
      content: "Review of {{steps.ticket.title}} for {{params.transition}}. Paths={{steps.ticket.affectedPaths}}. Complexity={{steps.complexity}}. Coverage={{steps.coverage}}. Ripple={{steps.rippleAnalysis}}. Actions={{steps.suggestions}}."
      tags:
        - council-review
        - "{{params.callerSpecialization}}"
        - "{{steps.ticket.ticketId}}"

  # 17. Re-check consensus after submitting verdicts
  - key: finalConsensus
    tool: check_consensus
    description: Re-evaluate quorum after new verdicts.
    condition: "!steps.consensus.advisoryReady"
    input:
      ticketId: "{{params.ticketId}}"
      transition: "{{params.transition}}"

  # 18. Handle veto — transition to blocked when consensus is vetoed
  - key: handleVeto
    tool: update_ticket_status
    description: Move ticket to blocked when architect/security veto prevents advancement.
    condition: "!steps.consensus.advisoryReady && steps.finalConsensus.blockedByVeto"
    onError: continue
    input:
      ticketId: "{{params.ticketId}}"
      status: blocked
      comment: "Council review: architect/security veto blocks {{params.transition}}. See review note for details."
