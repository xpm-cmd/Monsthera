name: CI

on:
  pull_request:
  push:
    branches: [main]

# CI corre sin Dolt ni Ollama: el contenedor degrada a almacenamiento in-memory
# (allowDegraded) y embeddings stub. Verificado: la suite completa pasa en estas
# condiciones (2226 tests). Esto mantiene el CI hermético y rápido.
env:
  MONSTHERA_DOLT_ENABLED: "false"
  MONSTHERA_SEMANTIC_ENABLED: "false"

jobs:
  verify:
    name: typecheck · lint · test · corpus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Gate de seguridad: falla sólo ante vulnerabilidades high+ en dependencias
      # de producción. Los moderate/low siguen siendo ruido no bloqueante.
      - name: Dependency audit (high)
        run: pnpm audit --prod --audit-level high

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      # Gate de integridad del corpus: falla sólo si hay findings de severidad
      # `error` (los warnings como orphan_citation / tag_near_duplicate no rompen).
      - name: Corpus integrity (knowledge + work)
        run: pnpm exec tsx src/bin.ts lint

      # Gate de cobertura: los umbrales (ratchet floors lines 72 / funcs 80 /
      # branches 61) viven en vitest.config y reflejan la cobertura real actual
      # con margen mínimo, así que la cobertura sólo puede subir, nunca regresar
      # en silencio. Sube cada floor a medida que mejore la cobertura.
      - name: Coverage
        run: pnpm coverage
