name: CI

on:
  pull_request:
  push:
    branches: [main]

# CI corre sin Dolt ni Ollama: el contenedor degrada a almacenamiento in-memory
# (allowDegraded) y embeddings stub. Verificado: la suite completa pasa en estas
# condiciones (2044 tests). Esto mantiene el CI hermético y rápido.
env:
  MONSTHERA_DOLT_ENABLED: "false"
  MONSTHERA_SEMANTIC_ENABLED: "false"

jobs:
  verify:
    name: typecheck · lint · test · corpus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      # Gate de integridad del corpus: falla sólo si hay findings de severidad
      # `error` (los warnings como orphan_citation / tag_near_duplicate no rompen).
      - name: Corpus integrity (knowledge + work)
        run: pnpm exec tsx src/bin.ts lint

      # Report-only por ahora: los umbrales de cobertura (lines/funcs 80%, branches
      # 70%) configurados en vitest.config aún no se cumplen (hoy: lines 73%,
      # branches 61%). Visible en cada PR, pero no bloquea hasta subir cobertura.
      - name: Coverage (report-only)
        run: pnpm coverage
        continue-on-error: true
